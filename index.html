<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login MY kasir</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 1. Background Animasi Profesional */
    body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; }
    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
      background-size: 400% 400%;
      animation: gradient 10s ease infinite;
    }
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 2. Card Login */
    .login-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 25px;
      text-align: center;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
    }

    /* 3. Logo Upload Area */
    .logo-area { cursor: pointer; margin-bottom: 20px; }
    .logo-box {
      width: 150px; height: 150px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      margin: 0 auto 10px; border: 2px dashed white;
      overflow: hidden; transition: 0.3s;
    }
    .logo-box img { width: 100%; height: 100%; object-fit: cover; }
    
    /* 4. Form Styling */
    input { 
      width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; 
      border: none; box-sizing: border-box; background: rgba(255,255,255,0.9);
    }
    .btn-login { 
      width: 100%; padding: 12px; background: #007bff; color: white; 
      border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="login-card">
    <!-- Logo Upload -->
    <div class="logo-area" onclick="document.getElementById('fileInput').click()">
      <div class="logo-box" id="logoBox">
        <i class="fa-solid fa-camera fa-3x" id="cameraIcon"></i>
        <img id="preview" src="#" style="display:none;">
      </div>
      <p style="font-size: 12px; opacity: 0.8;">Klik untuk tambah/ganti Logo</p>
      <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImage(this)">
    </div>

    <h2>Login MY kasir</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button class="btn-login" onclick="login()">Masuk Sistem</button>
  </div>
</div>

<script>
  // Fungsi Preview Gambar
  function previewImage(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = function(e) {
        document.getElementById('preview').src = e.target.result;
        document.getElementById('preview').style.display = 'block';
        document.getElementById('cameraIcon').style.display = 'none';
      }
      reader.readAsDataURL(input.files[0]);
    }
  }

  // Fungsi Login
  function login() {
    const user = document.getElementById('username').value.toLowerCase();
    const pass = document.getElementById('password').value;

    if ((user === 'owner' && pass === 'owner99') || (user === 'admin' && pass === 'admin')) {
      alert('Selamat Datang, ' + user.toUpperCase());
      // Lanjut ke dashboard...
    } else {
      alert('Username atau Password salah!');
    }
  }
</script>

</body>
</html>
