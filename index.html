<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY kasir</title>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Hubungkan ke file CSS Anda -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HALAMAN 1: LOGIN -->
  <div id="login-page">
    <div class="login-card">
      <div style="margin-bottom: 20px; color: rgba(255, 255, 255, 0.9);">
        <i class="fa-solid fa-circle-user fa-5x"></i>
      </div>
      <h2 style="margin-top: 0; margin-bottom: 20px;">MY kasir</h2>
      <input type="text" id="user" placeholder="Username">
      <input type="password" id="pass" placeholder="Password">
      <input type="text" id="inputAdminName" placeholder="Nama Anda (Admin Jaga)">
      <button onclick="login()">Masuk</button>
    </div>
  </div>

<!-- DASHBOARD UTAMA -->
<div id="dashboard-main" style="display:none;">
    <div class="header-dash" style="display: flex; justify-content: space-between; align-items: center; padding: 20px;">
        <div>
            <h2 id="welcomeMsg">Selamat Datang</h2>
            <p>MY Kasir</p>
        </div>
  
    <div class="grid-menu">
        <div class="menu-item" onclick="switchPage('page-transaksi')">
            <i class="fa-solid fa-receipt fa-4x" style="color: #4f46e5;"></i>
            <p>Transaksi</p>
        </div>
        <div class="menu-item" onclick="switchPage('page-stok')">
            <i class="fa-solid fa-layer-group fa-4x" style="color: #10b981;"></i>
            <p>Stok Barang</p>
        </div>
        <div class="menu-item" onclick="switchPage('page-tambah-stok')">
            <i class="fa-solid fa-circle-plus fa-4x" style="color: #f59e0b;"></i>
            <p>Tambah Stok</p>
        </div>
        <div class="menu-item" onclick="switchPage('page-pembukuan-harian')">
            <i class="fa-solid fa-clipboard-list fa-4x" style="color: #8b5cf6;"></i>
            <p>Pembukuan Harian</p>
        </div>
        <div class="menu-item owner-only hidden" onclick="switchPage('page-analisa')">
            <i class="fa-solid fa-chart-column fa-4x" style="color: #ec4899;"></i>
            <p>Analisa</p>
        </div>
        <div class="menu-item owner-only hidden" onclick="switchPage('page-pembukuan-full')">
            <i class="fa-solid fa-file-signature fa-4x" style="color: #ef4444;"></i>
            <p>Laporan Bulanan</p>
        </div>
    </div>
</div>

<!-- SUB-PAGES -->
<div id="page-transaksi" class="sub-page" style="display:none;"><h2>Transaksi</h2><button onclick="backToDashboard()">Kembali</button></div>
<div id="page-stok" class="sub-page" style="display:none;"><h2>Stok Barang</h2><button onclick="backToDashboard()">Kembali</button></div>
<div id="page-tambah-stok" class="sub-page" style="display:none;"><h2>Tambah Stok</h2><button onclick="backToDashboard()">Kembali</button></div>
<div id="page-pembukuan-harian" class="sub-page" style="display:none;"><h2>Pembukuan Harian</h2><button onclick="backToDashboard()">Kembali</button></div>
<div id="page-analisa" class="sub-page" style="display:none;"><h2>Analisa</h2><button onclick="backToDashboard()">Kembali</button></div>
<div id="page-pembukuan-full" class="sub-page" style="display:none;"><h2>Laporan Bulanan</h2><button onclick="backToDashboard()">Kembali</button></div>

  <!-- Area Struk (Tersembunyi) -->
  <div id="printArea" style="display:none; font-family: monospace; width: 250px; padding: 10px;">
      <div style="text-align: center;">
          <h3>MY kasir</h3>
          <p id="printWaktu"></p>
          <hr>
      </div>
      <div id="printItem"></div>
      <hr>
      <p>Kasir: <span id="printKasir"></span></p>
      <p style="text-align: center;">Terima Kasih</p>
  </div>

<script>
    let currentUser = { name: '', role: '' };

    // --- FUNGSI LOGIN ---
    function login() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        const namaAdmin = document.getElementById('inputAdminName').value;

        if (namaAdmin === "") {
            alert("Mohon isi nama admin yang berjaga!");
            return;
        }

        if (u === 'admin' && p === 'admin') {
            currentUser = { name: namaAdmin, role: 'admin' };
            masukKeDashboard();
        } else if (u === 'owner' && p === 'owner99') {
            currentUser = { name: namaAdmin, role: 'owner' };
            masukKeDashboard();
        } else {
            alert('Username atau Password salah!');
        }
    }

    // --- FUNGSI TAMPIL DASHBOARD ---
    function masukKeDashboard() {
        document.getElementById('welcomeMsg').innerText = "Selamat Datang, " + currentUser.name;

        document.getElementById('login-page').style.display = 'none';
        document.getElementById('dashboard-main').style.display = 'block';

        if (currentUser.role === 'owner') {
            document.querySelectorAll('.owner-only').forEach(el => el.classList.remove('hidden'));
        }
    }

    // --- FUNGSI LOGOUT ---
    function logout() {
        if (confirm("Apakah Anda yakin ingin keluar?")) {
            document.getElementById('dashboard-main').style.display = 'none';
            document.querySelectorAll('.sub-page').forEach(el => el.style.display = 'none');
            document.getElementById('login-page').style.display = 'flex';
            
            document.getElementById('user').value = '';
            document.getElementById('pass').value = '';
            document.getElementById('inputAdminName').value = '';
        }
    }

    // --- FUNGSI NAVIGASI ---
    function switchPage(pageId) {
        document.getElementById('dashboard-main').style.display = 'none';
        document.querySelectorAll('.sub-page').forEach(el => el.style.display = 'none');
        document.getElementById(pageId).style.display = 'block';
    }

    function backToDashboard() {
        document.querySelectorAll('.sub-page').forEach(el => el.style.display = 'none');
        document.getElementById('dashboard-main').style.display = 'block';
    }

    // --- FUNGSI CETAK STRUK ---
    function cetakStruk() {
        const namaKasir = currentUser.name || "Admin"; 
        document.getElementById('printKasir').innerText = namaKasir;
        document.getElementById('printWaktu').innerText = new Date().toLocaleString();

        const originalContent = document.body.innerHTML;
        const printContent = document.getElementById('printArea').innerHTML;

        document.body.innerHTML = printContent;
        window.print();
        document.body.innerHTML = originalContent;
        document.getElementById('printArea').style.display = 'none';
    }

    // --- FUNGSI WA ---
    function kirimKeWA() {
        const pesan = "Halo Owner, ini laporan pembukuan hari ini: [Data Transaksi...]";
        const url = `https://wa.me/6287735376239?text=${encodeURIComponent(pesan)}`;
        window.open(url, '_blank');
    }
</script>

<!-- Tombol Keluar di Pojok Kanan Bawah -->
<div class="logout-fixed">
    <button onclick="logout()" style="padding: 10px 20px; background: #ef4444; border: none; color: white; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
        <i class="fa-solid fa-right-from-bracket"></i> Keluar
    </button>
</div>

</body>
</html>
