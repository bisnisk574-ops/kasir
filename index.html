<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY kasir</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* CSS Dasar & Modern */
    body { font-family: 'Segoe UI', sans-serif; margin:0; background: #f4f7f6; }
    
    /* Login Page (Sama dengan sebelumnya) */
    #login-page { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #0f2027, #2c5364); }
    .login-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; color: white; width: 300px; text-align: center; }
    
    /* Dashboard Layout */
    #dashboard-page { display: none; padding: 20px; }
.header-dash {
    text-align: center; /* Membuat semua isi di dalam div ini ke tengah */
    padding: 30px 20px;
}

#welcomeMsg {
    font-size: 2.5rem; /* Ukuran sangat besar */
    margin: 0;
    color: #1f2937; /* Warna gelap agar profesional */
}

.header-dash p {
    font-size: 1.5rem; /* Ukuran besar untuk sub-judul */
    margin: 10px 0 0 0;
    color: #6b7280; /* Warna abu-abu agar elegan */
    font-weight: 600; /* Sedikit tebal */
}

    .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .menu-item { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.3s; }
    .menu-item:hover { transform: translateY(-5px); }
    
    /* Utility */
    .hidden { display: none; }
    input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ccc; }

    .menu-item { 
    background: white; padding: 20px; border-radius: 20px; 
    text-align: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
    cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.menu-item p { margin: 0; font-weight: 600; font-size: 14px; }

    @media print {
    /* Sembunyikan semua elemen di layar */
    body * { visibility: hidden; }
    
    /* Tampilkan hanya area print */
    #printArea, #printArea * { visibility: visible; }
    
    /* Posisikan di pojok kiri atas kertas */
    #printArea { 
        position: absolute; 
        left: 0; 
        top: 0; 
        display: block !important; /* Paksa tampil saat print */
    }
      }
    </style>
</head>
<body>

<!-- HALAMAN 1: LOGIN -->
<div id="login-page">
<div class="login-card">
  <!-- ICON HUMAN BESAR -->
  <div style="margin-bottom: 20px; color: rgba(255, 255, 255, 0.9);">
    <i class="fa-solid fa-circle-user fa-5x"></i>
  </div>

  <h2 style="margin-top: 0; margin-bottom: 20px;">MY kasir</h2>
  
  <input type="text" id="user" placeholder="Username">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Masuk</button>
</div>
</div>

<!-- HALAMAN 2: DASHBOARD -->
<div id="dashboard-page">
  <div class="header-dash">
    <h2 id="welcomeMsg">Selamat Datang</h2>
    <p>MY Kasir</p>
  </div>

<div class="grid-menu">
    <!-- Transaksi -->
    <div class="menu-item" onclick="openMenu('transaksi')">
        <i class="fa-solid fa-cash-register fa-2x" style="color: #4f46e5;"></i>
        <p>Transaksi</p>
    </div>
    
    <!-- Stok Barang -->
    <div class="menu-item" onclick="openMenu('stok')">
        <i class="fa-solid fa-boxes-stacked fa-2x" style="color: #10b981;"></i>
        <p>Stok Barang</p>
    </div>
    
    <!-- Tambah Stok -->
    <div class="menu-item" onclick="openMenu('tambahstok')">
        <i class="fa-solid fa-plus-circle fa-2x" style="color: #f59e0b;"></i>
        <p>Tambah Stok</p>
    </div>
    
    <!-- Pembukuan Hari Ini -->
    <div class="menu-item" onclick="openMenu('pembukuan-hari')">
        <i class="fa-solid fa-book-open fa-2x" style="color: #8b5cf6;"></i>
        <p>Pembukuan Hari</p>
    </div>
    
    <!-- Analisa (Owner Only) -->
    <div class="menu-item owner-only hidden" onclick="openMenu('analisa')">
        <i class="fa-solid fa-chart-line fa-2x" style="color: #ec4899;"></i>
        <p>Analisa</p>
    </div>
    
    <!-- Laporan Bulanan (Owner Only) -->
    <div class="menu-item owner-only hidden" onclick="openMenu('pembukuan-full')">
        <i class="fa-solid fa-file-invoice-dollar fa-2x" style="color: #ef4444;"></i>
        <p>Laporan Bulanan</p>
    </div>
</div>

<script>
  let currentUser = { name: '', role: '' };

  function login() {
    const u = document.getElementById('user').value.toLowerCase();
    const p = document.getElementById('pass').value;

    if (u === 'owner' && p === 'owner99') {
      currentUser = { name: 'Owner', role: 'owner' };
      initDashboard();
    } else if (u === 'admin' && p === 'admin') {
      currentUser = { name: 'Admin', role: 'admin' };
      initDashboard();
    } else {
      alert('Login Gagal');
    } else {
      alert('Username atau Password salah!');
    }
  }

  function initDashboard() {
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('dashboard-page').style.display = 'block';
    document.getElementById('welcomeMsg').innerText = "Selamat Datang, " + currentUser.name;
    
    // Tampilkan menu khusus owner jika role-nya owner
    if (currentUser.role === 'owner') {
      document.querySelectorAll('.owner-only').forEach(el => el.classList.remove('hidden'));
    }
  }

  function openMenu(menu) {
    alert("Anda masuk ke: " + menu);
    // Di sini nanti Anda bisa buat fungsi untuk pindah halaman atau menampilkan popup
    
    if (menu === 'pembukuan-hari') {
        kirimKeWA();
    }
  }

  function kirimKeWA() {
    const pesan = "Halo Owner, ini laporan pembukuan hari ini: [Data Transaksi...]";
    const url = `https://wa.me/6287735376239?text=${encodeURIComponent(pesan)}`;
    window.open(url, '_blank');
  }
</script>
</body>
</html>
</script>
<!-- Area Struk (Disembunyikan) -->
<div id="printArea" style="display:none; font-family: monospace; width: 250px; padding: 10px;">
    <div style="text-align: center;">
        <h3>MY kasir</h3>
        <p id="printWaktu"></p>
        <hr>
    </div>
    <div id="printItem">
        <!-- Item akan masuk di sini -->
    </div>
    <hr>
    <p>Kasir: <span id="printKasir"></span></p>
    <p style="text-align: center;">Terima Kasih</p>
</div>
</body>
</html>
