<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir</title>
  
  <!-- Google Fonts: Plus Jakarta Sans (Modern & Bersih) -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- FontAwesome untuk Ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root { --primary: #4f46e5; --bg: #f3f4f6; --text: #1f2937; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
    
    header { background: var(--primary); color: white; padding: 20px; text-align: center; }
    
    nav { display: flex; justify-content: center; gap: 10px; padding: 15px; background: white; border-bottom: 1px solid #e5e7eb; }
    nav button { padding: 10px 16px; border: none; background: #e5e7eb; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
    nav button.active { background: var(--primary); color: white; }

    section { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
    section.active { display: block; animation: fadeIn 0.3s; }
    
    .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #d1d5db; border-radius: 10px; box-sizing: border-box; }
    button.btn-utama { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

  <header>
    <h1 style="margin:0; font-size: 1.5rem;">Kasir</h1>
  </header>

  <nav>
    <button class="active" onclick="showPage('transaksi', this)"><i class="fa-solid fa-cash-register"></i> Transaksi</button>
    <button onclick="showPage('history', this)"><i class="fa-solid fa-clock-rotate-left"></i> History</button>
    <button onclick="showPage('rekap', this)"><i class="fa-solid fa-chart-pie"></i> Rekap</button>
  </nav>

  <!-- Halaman Transaksi -->
  <section id="transaksi" class="active">
    <div class="card">
      <h3 style="margin-top:0;">Input Penjualan</h3>
      <input type="text" id="produk" placeholder="Nama produk...">
      <input type="number" id="harga" placeholder="Harga (Rp)...">
      <button class="btn-utama" onclick="simpanTransaksi()">Simpan Transaksi</button>
    </div>
  </section>

  <!-- Halaman History -->
  <section id="history">
    <div class="card">
      <h3 style="margin-top:0;">History</h3>
      <ul id="listHistory" style="padding-left: 20px;"></ul>
      <button class="btn-utama" onclick="cetakStruk()"><i class="fa-solid fa-print"></i> Cetak Struk</button>
    </div>
  </section>

  <!-- Halaman Rekap -->
  <section id="rekap">
    <div class="card">
      <h3>Statistik Penjualan</h3>
      <p>Total transaksi: <b id="totalTransaksi">0</b></p>
      <p>Total omzet: Rp <b id="totalOmzet">0</b></p>
    </div>
  </section>

  <script>
    function showPage(pageId, btn) {
      // Hapus kelas active dari semua section dan button
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      
      // Tampilkan halaman yang dipilih
      document.getElementById(pageId).classList.add('active');
      btn.classList.add('active');
    }
  </script>
</body>
</html>
