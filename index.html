<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY kasir</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- Halaman Login (Muncul Pertama) -->
  <div id="login-page" class="login-container">
    <div class="login-card">
      <h2 style="color: white;">Login SG CELL</h2>
      <input type="text" id="username" placeholder="Username">
      <input type="password" id="password" placeholder="Password">
      <button class="btn-login" onclick="login()">Masuk</button>
    </div>
  </div>

  <!-- Dashboard (Disembunyikan sampai login sukses) -->
  <div id="app-page" style="display: none;">
    <header><h1>Kasir SG CELL</h1></header>
    <nav>
      <button onclick="showPage('transaksi')"><i class="fa-solid fa-cash-register"></i> Transaksi</button>
      <button onclick="showPage('history')"><i class="fa-solid fa-history"></i> History</button>
    </nav>
    <main id="content">
      <!-- Konten dinamis masuk sini -->
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
